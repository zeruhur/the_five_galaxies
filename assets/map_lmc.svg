<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 570" width="100%">
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #111; }
    .map-title { font-size: 13px; font-weight: bold; letter-spacing: 2px; }
    .subtitle { font-size: 9px; fill: #555; }
    .territory-name { font-size: 11px; font-weight: bold; letter-spacing: 1px; }
    .territory-type { font-size: 8px; font-style: italic; fill: #666; }
    .loc-label { font-size: 8.5px; }
    .loc-note { font-size: 7.5px; font-style: italic; fill: #555; }
    .wan-label { font-size: 8px; fill: #444; }
    .border-d { stroke: #888; stroke-width: 0.8; fill: none; stroke-dasharray: 5,4; }
    .border-dot { stroke: #bbb; stroke-width: 0.8; fill: none; stroke-dasharray: 2,3; }
    .galaxy { fill: #f9f9f9; stroke: #111; stroke-width: 1.5; }
    .dot { fill: #111; }
    .wan-node { fill: white; stroke: #111; stroke-width: 1; }
    .legend-label { font-size: 8px; fill: #444; }
    .credit { font-size: 8px; fill: #bbb; }
  </style>

  <rect width="920" height="570" fill="white"/>

  <text x="460" y="27" class="map-title" text-anchor="middle">LARGE MAGELLANIC CLOUD — POLITICAL ZONES</text>
  <text x="460" y="43" class="subtitle" text-anchor="middle">SY 5.151.267 · schematic · territorial extents approximate</text>

  <!-- Galaxy ellipse -->
  <ellipse class="galaxy" cx="460" cy="305" rx="380" ry="218"/>

  <!-- Territory borders -->
  <!-- Wrulis / Enthor border: dashed (heavily disputed, Three Borders situation) -->
  <line class="border-d" x1="528" y1="99" x2="558" y2="514"/>
  <!-- Enthor outer limit / unmapped space: dotted -->
  <line class="border-dot" x1="700" y1="112" x2="760" y2="495"/>

  <!-- Territory labels -->
  <text x="305" y="295" class="territory-name" text-anchor="middle">EMPIRE OF WRULIS</text>
  <text x="305" y="310" class="territory-type" text-anchor="middle">Tesu · monarchical empire · primary territory</text>
  <text x="305" y="323" class="territory-type" text-anchor="middle">succession crisis; Council of Advisors divided</text>

  <text x="618" y="295" class="territory-name" text-anchor="middle">CONFEDERACY</text>
  <text x="618" y="310" class="territory-name" text-anchor="middle">OF ENTHOR</text>
  <text x="618" y="325" class="territory-type" text-anchor="middle">Hetsu clans · border territory</text>
  <text x="618" y="338" class="territory-type" text-anchor="middle">clans operating outside Confederacy authority</text>

  <text x="790" y="305" class="territory-type" text-anchor="middle" transform="rotate(-90,790,305)">unmapped</text>

  <!-- Notable locations -->
  <circle class="dot" cx="308" cy="238" r="3.5"/>
  <text x="316" y="235" class="loc-label">Vault Station Elys-3</text>
  <text x="316" y="246" class="loc-note">Elysian genetic vault — Imperial quarantine; rationale classified; Elyros access denied</text>

  <circle class="dot" cx="580" cy="205" r="3.5"/>
  <text x="572" y="195" class="loc-label" text-anchor="end">Tarantula Nebula extraction zone</text>
  <text x="572" y="206" class="loc-note" text-anchor="end">hyperion gas deposits — Wrulis claim vs. Hetsu operations; both active simultaneously</text>

  <circle class="dot" cx="718" cy="375" r="3.5"/>
  <text x="710" y="365" class="loc-label" text-anchor="end">The Three Borders</text>
  <text x="710" y="376" class="loc-note" text-anchor="end">Wrulis / Enthor / unmapped intersection — last treaty attempt unacknowledged by both parties</text>

  <!-- WAN inter-galaxy nodes -->
  <circle class="wan-node" cx="201" cy="149" r="4"/>
  <text x="209" y="146" class="wan-label">→ Milky Way WAN</text>

  <circle class="wan-node" cx="708" cy="468" r="4"/>
  <text x="700" y="480" class="wan-label" text-anchor="end">→ SMC WAN</text>

  <!-- Legend -->
  <g transform="translate(30, 542)">
    <line x1="0" y1="0" x2="28" y2="0" class="border-d"/>
    <text x="35" y="4" class="legend-label">disputed border</text>
    <line x1="155" y1="0" x2="183" y2="0" class="border-dot"/>
    <text x="190" y="4" class="legend-label">approximate outer limit (unmapped beyond)</text>
    <circle cx="405" cy="0" r="3.5" fill="#111"/>
    <text x="413" y="4" class="legend-label">notable location</text>
    <circle cx="510" cy="0" r="4" fill="white" stroke="#111" stroke-width="1"/>
    <text x="518" y="4" class="legend-label">WAN inter-galaxy node</text>
  </g>

  <text x="890" y="560" class="credit" text-anchor="end">Roberto Bisceglie · CC BY-SA 4.0</text>
</svg>
